trigger:
  branches:
    include:
      - main
      - master

pool:
  vmImage: 'ubuntu-latest'

variables:
  azureSubscription: 'YOUR_SERVICE_CONNECTION_NAME'  # TODO: Replace with your service connection
  webAppName: 'mdc-web-dashboard-preview-cheserbyewgyeddm'
  resourceGroupName: 'YOUR_RESOURCE_GROUP'           # TODO: Replace with your resource group
  nodeVersion: '20.x'

stages:
  # Build Stage
  - stage: Build
    displayName: 'Build Stage'
    jobs:
      - job: Build
        displayName: 'Build Next.js App'
        steps:
          - task: NodeTool@0
            displayName: 'Install Node.js'
            inputs:
              versionSpec: '$(nodeVersion)'

          - script: |
              npm ci
            displayName: 'Install dependencies'

          - script: |
              npm run build
            displayName: 'Build Next.js app'
            env:
              NEXT_PUBLIC_API_URL: $(NEXT_PUBLIC_API_URL)
              NEXT_PUBLIC_MDC_API_URL: $(NEXT_PUBLIC_MDC_API_URL)
              NEXT_PUBLIC_ENTRA_CLIENT_ID: $(NEXT_PUBLIC_ENTRA_CLIENT_ID)
              NEXT_PUBLIC_ENTRA_TENANT_ID: $(NEXT_PUBLIC_ENTRA_TENANT_ID)
              NEXT_PUBLIC_ENTRA_REDIRECT_URI: $(NEXT_PUBLIC_ENTRA_REDIRECT_URI)
              NEXT_PUBLIC_ENTRA_AUTHORITY: $(NEXT_PUBLIC_ENTRA_AUTHORITY)

          - script: |
              cp -r .next/static .next/standalone/.next/static
              cp -r public .next/standalone/public
              cp start.js .next/standalone/start.js
            displayName: 'Prepare standalone package'

          - task: ArchiveFiles@2
            displayName: 'Archive build files'
            inputs:
              rootFolderOrFile: '.next/standalone'
              includeRootFolder: false
              archiveType: 'zip'
              archiveFile: '$(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip'
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: 'Publish artifacts'
            inputs:
              pathToPublish: '$(Build.ArtifactStagingDirectory)'
              artifactName: 'drop'

  # Deploy Stage
  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Build
    condition: succeeded()
    jobs:
      - deployment: Deploy
        displayName: 'Deploy to Azure App Service'
        environment: 'production'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: AzureWebApp@1
                  displayName: 'Deploy to Azure App Service'
                  inputs:
                    azureSubscription: '$(azureSubscription)'
                    appType: 'webAppLinux'
                    appName: '$(webAppName)'
                    package: '$(Pipeline.Workspace)/drop/$(Build.BuildId).zip'
                    runtimeStack: 'NODE|20-lts'
                    startUpCommand: 'node start.js'
